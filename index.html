<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiPico</title>
    <style>
        /* Basic styles for the button */
        .load-game-button {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: blue;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .file-picker {
            display: none;
        }
    </style>
</head>
<body>
    <h1>Welcome to MobiPico</h1>
    <button class="load-game-button" id="loadGameButton">Load Game</button>
    <input type="file" class="file-picker" id="filePicker" />

    <script>
        const loadGameButton = document.getElementById('loadGameButton');
        const filePicker = document.getElementById('filePicker');

        loadGameButton.addEventListener('click', () => {
            filePicker.click();
        });

        filePicker.addEventListener('change', (event) => {
            // Logic to handle file selection
            const file = event.target.files[0];
            if (file) {
                console.log(`File selected: ${file.name}`);
                event.preventDefault();
                filePicker.click();
            }
        });

        // Add keyboard support for the button
        loadGameButton.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                filePicker.click();
            }
        });
    </script>
</body>
