<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MobiPico</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-picker {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .load-game-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #2D5AF7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .load-game-button:hover {
            background-color: #1a3eb3;
        }

        .file-picker {
            display: none;
        }

        #gameContainer {
            display: none;
            width: 100%;
            max-width: 512px;
            text-align: center;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 2px solid #333;
            background-color: #000;
            max-width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        h1, h2 {
            color: #333;
        }
    </style>
</head>
<body>
    <div id="gamePicker" class="game-picker">
        <h1>MobiPico</h1>
        <p>Select a PICO-8 game file (.p8 or .p8.png)</p>
        <button class="load-game-button" id="loadGameButton">Load Cartridge</button>
        <input type="file" class="file-picker" id="filePicker" accept=".p8,.p8.png" />
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Load configuration and engine loader -->
    <script src="config.js"></script>
    <script src="engines/pico8/load.js"></script>

    <script>
        window.engineRootDir = 'engines/pico8';

        const loadGameButton = document.getElementById('loadGameButton');
        const filePicker = document.getElementById('filePicker');
        const gamePicker = document.getElementById('gamePicker');
        const gameContainer = document.getElementById('gameContainer');
        const gameTitle = document.getElementById('gameTitle');
        const gameCanvas = document.getElementById('gameCanvas');

        loadGameButton.addEventListener('click', () => {
            filePicker.click();
        });

        filePicker.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                handleFileSelection(file);
            }
        });

        function handleFileSelection(file) {
            const fileName = file.name;
            const fileExtension = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
            
            if (!window.emuConfig || !window.emuConfig.extensions[fileExtension]) {
                console.error("Unsupported file type or config missing");
                return;
            }

            const loadConfig = window.emuConfig.extensions[fileExtension];
            const engineConfig = window.emuConfig.engines[loadConfig.engine];

            if (!engineConfig) return;

            if (loadConfig.loadAs === 'data') {
                const reader = new FileReader();
                reader.onload = (e) => startGame(engineConfig, fileName, e.target.result, null);
                reader.readAsText(file);
            } else if (loadConfig.loadAs === 'url') {
                const gameUrl = URL.createObjectURL(file);
                startGame(engineConfig, fileName, null, gameUrl);
            }
        }

        function startGame(engineConfig, fileName, gameData, gameUrl) {
            gamePicker.style.display = 'none';
            gameContainer.style.display = 'block';

            try {
                if (window.LoadEngine) {
                    window.LoadEngine(
                        engineConfig,
                        gameTitle,
                        gameCanvas,
                        gameData,
                        fileName,
                        gameUrl
                    );
                }
            } catch (error) {
                console.error('LoadEngine error:', error);
            }
        }

        // Handle keyboard accessibility for the main button
        loadGameButton.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                filePicker.click();
            }
        });
    </script>
</body>
</html>
