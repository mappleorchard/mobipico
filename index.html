<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiPico</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .game-picker {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .load-game-button {
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: white;
            background-color: blue;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .load-game-button:hover {
            background-color: darkblue;
        }

        .file-picker {
            display: none;
        }

        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background-color: #ddd;
            border-radius: 5px;
            max-width: 500px;
            text-align: left;
        }

        #gameContainer {
            display: none;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="gamePicker" class="game-picker">
        <h1>Welcome to MobiPico</h1>
        <p>Select a PICO-8 game file (.p8 or .p8.png)</p>
        <button class="load-game-button" id="loadGameButton">Load Game</button>
        <input type="file" class="file-picker" id="filePicker" accept=".p8,.p8.png" />
        <div class="debug-info">
            <div id="debugOutput">No file selected yet</div>
        </div>
    </div>

    <div id="gameContainer">
        <h2 id="gameTitle"></h2>
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Load configuration and engine loader -->
    <script src="config.js"></script>
    <script src="engines/pico8/load.js"></script>

    <script>
        // Setup engine root directory
        window.engineRootDir = 'engines/pico8';

        const loadGameButton = document.getElementById('loadGameButton');
        const filePicker = document.getElementById('filePicker');
        const gamePicker = document.getElementById('gamePicker');
        const gameContainer = document.getElementById('gameContainer');
        const gameTitle = document.getElementById('gameTitle');
        const gameCanvas = document.getElementById('gameCanvas');
        const debugOutput = document.getElementById('debugOutput');

        function log(message) {
            console.log('[MobiPico] ' + message);
            debugOutput.innerHTML += '<p>' + message + '</p>';
        }

        function logError(message) {
            console.error('[MobiPico Error] ' + message);
            debugOutput.innerHTML += '<p style="color: red;"><strong>ERROR:</strong> ' + message + '</p>';
            alert('Error: ' + message);
        }

        // Check if config loaded
        if (window.emuConfig) {
            log('✓ Config loaded successfully');
        } else {
            logError('Config file failed to load!');
        }

        // Check if LoadEngine function exists
        if (window.LoadEngine) {
            log('✓ LoadEngine function loaded successfully');
        } else {
            logError('LoadEngine function not found!');
        }

        loadGameButton.addEventListener('click', () => {
            log('Load Game button clicked');
            filePicker.click();
        });

        filePicker.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                log('File selected: ' + file.name + ' (' + file.size + ' bytes)');
                handleFileSelection(file);
            } else {
                log('File selection cancelled');
            }
        });

        function handleFileSelection(file) {
            const fileName = file.name;
            const fileExtension = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
            
            log('File extension: ' + fileExtension);

            // Check if file extension is supported
            if (!window.emuConfig.extensions[fileExtension]) {
                logError('Unsupported file type: ' + fileExtension + '\nSupported types: .p8, .p8.png');
                return;
            }

            const loadConfig = window.emuConfig.extensions[fileExtension];
            log('Load config: ' + JSON.stringify(loadConfig));

            const engineConfig = window.emuConfig.engines[loadConfig.engine];
            if (!engineConfig) {
                logError('Engine configuration not found for: ' + loadConfig.engine);
                return;
            }

            log('Engine config loaded: ' + loadConfig.engine);

            if (loadConfig.loadAs === 'data') {
                log('Loading as data (text)...');
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const gameData = e.target.result;
                    log('File read successfully (' + gameData.length + ' characters)');
                    startGame(engineConfig, fileName, gameData, null);
                };
                
                reader.onerror = (e) => {
                    logError('FileReader error: ' + e.target.error);
                };
                
                reader.readAsText(file);
                
            } else if (loadConfig.loadAs === 'url') {
                log('Loading as URL (blob)...');
                const gameUrl = URL.createObjectURL(file);
                log('Blob URL created: ' + gameUrl);
                startGame(engineConfig, fileName, null, gameUrl);
            }
        }

        function startGame(engineConfig, fileName, gameData, gameUrl) {
            log('Starting game with fileName: ' + fileName);
            log('Game data: ' + (gameData ? gameData.length + ' chars' : 'null'));
            log('Game URL: ' + (gameUrl ? gameUrl : 'null'));

            // Hide game picker, show game container
            gamePicker.style.display = 'none';
            gameContainer.style.display = 'block';

            try {
                // Initialize the game
                window.LoadEngine(
                    engineConfig,           // Engine configuration
                    gameTitle,              // Title element
                    gameCanvas,             // Canvas element
                    gameData,               // Game data (for .p8 files) or null (for .p8.png)
                    fileName,               // Game file name
                    gameUrl                 // Game file URL (for .p8.png files) or null (for .p8)
                );
                
                log('LoadEngine called successfully!');
                
            } catch (error) {
                logError('LoadEngine error: ' + error.message);
                console.error(error);
            }
        }

        // Add keyboard support for the button
        loadGameButton.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                filePicker.click();
            }
        });

        log('Script loaded and initialized');
    </script>
</body>
</html>
